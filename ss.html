<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel to Image JSON Converter</title>
    <!-- Library for Excel Parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --dark: #1f2937;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }

        h1 { color: var(--dark); font-size: 1.5rem; margin-bottom: 1.5rem; }

        .upload-section {
            border: 2px dashed #d1d5db;
            padding: 2rem;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            transition: border-color 0.3s;
        }

        .upload-section:hover { border-color: var(--primary); }

        #fileInput { margin-bottom: 1rem; }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        button {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: none; /* Hidden until file is processed */
        }

        button:active { transform: scale(0.98); }

        pre {
            background: #111827;
            color: #10b981;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            max-height: 500px;
            font-size: 0.875rem;
            display: none; /* Hidden until data exists */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Excel to JSON Converter</h1>
    
    <div class="upload-section">
        <input type="file" id="fileInput" accept=".xlsx, .xls" />
        <p style="color: #6b7280; font-size: 0.8rem;">Upload your Excel sheet with image columns</p>
    </div>

    <div class="controls">
        <span id="status" style="font-size: 0.9rem; font-weight: bold;"></span>
        <button id="copyBtn" onclick="copyJson()">Copy JSON</button>
    </div>

    <pre id="jsonOutput"></pre>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const jsonOutput = document.getElementById('jsonOutput');
    const copyBtn = document.getElementById('copyBtn');
    const status = document.getElementById('status');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                // Get the first sheet
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // Convert to JSON
                const rawData = XLSX.utils.sheet_to_json(worksheet);

                // Map the data dynamically based on your specific keys
                const formattedData = rawData.map(row => ({
                    image_name: row['IMAGES NAME'] || "N/A",
                    extensions: {
                        jpg: row['JPG'] || row['jpg'] || null,
                        jpeg: row['JPEG'] || row['jpeg'] || null,
                        png: row['PNG'] || row['png'] || null
                    },
                    link: row['link'] || ""
                }));

                // Show UI elements
                const jsonString = JSON.stringify(formattedData, null, 4);
                jsonOutput.textContent = jsonString;
                jsonOutput.style.display = 'block';
                copyBtn.style.display = 'block';
                status.innerText = "File processed successfully!";
                status.style.color = "var(--success)";
                
            } catch (error) {
                console.error(error);
                status.innerText = "Error processing file.";
                status.style.color = "red";
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function copyJson() {
        const text = jsonOutput.textContent;
        navigator.clipboard.writeText(text).then(() => {
            const originalBtnText = copyBtn.innerText;
            copyBtn.innerText = "Copied!";
            copyBtn.style.background = "#064e3b";
            
            setTimeout(() => {
                copyBtn.innerText = originalBtnText;
                copyBtn.style.background = "var(--success)";
            }, 2000);
        });
    }
</script>

</body>
</html>
